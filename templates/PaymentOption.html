<!DOCTYPE html>
<html>

<head>
<title>Payment Option</title>

<style>

/* PAGE */

body{
font-family:Arial, Helvetica, sans-serif;
background:#fafafa;
margin:0;
text-align:center;
}

/* NAVBAR */

.navbar{
background:#111;
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 30px;
}

.nav-left a{
color:white;
text-decoration:none;
margin-right:25px;
font-size:17px;
font-weight:bold;
}

.nav-left a:hover{
color:#ff4d4d;
}

.nav-right{
display:flex;
align-items:center;
}

.profile-icon{
width:35px;
height:35px;
border-radius:50%;
margin-right:20px;
cursor:pointer;
}

.logout-btn{
background:#ff4d4d;
color:white;
padding:8px 16px;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

.logout-btn:hover{
background:#e63c3c;
}

/* PAYMENT CARD */

.payment-container{
background:white;
width:420px;
margin:60px auto;
padding:30px;
border-radius:12px;
box-shadow:0 6px 18px rgba(0,0,0,0.1);
}

/* HEADINGS */

h1{
color:#ff4d4d;
margin-top:20px;
}

h2{
color:#333;
}

h3{
color:#555;
}

/* QUANTITY */

.qty{
font-size:20px;
width:60px;
text-align:center;
border:1px solid #ccc;
border-radius:6px;
padding:5px;
}

/* BUTTONS */

button{
padding:10px 16px;
font-size:18px;
cursor:pointer;
border:none;
border-radius:6px;
background:#ff4d4d;
color:white;
}

button:hover{
background:#e63c3c;
}

/* DROPDOWN */

select{
width:100%;
padding:10px;
font-size:16px;
border-radius:6px;
border:1px solid #ccc;
margin-top:10px;
}

/* QR SECTION */

.qrbox{
display:none;
margin-top:20px;
}

.qrbox img{
width:200px;
border-radius:10px;
}

.place-btn{
margin-top:20px;
width:100%;
font-size:18px;
}

</style>
</head>

<body>

<div class="navbar">

<div class="nav-left">
<a href="/home">Home</a>
<a href="/menu">Menu</a>
<a href="/myorders">My Orders</a>
</div>

<div class="nav-right">
<a href="/profile">
<img src="https://cdn-icons-png.flaticon.com/512/847/847969.png" class="profile-icon">
</a>

<a href="/logout">
<button class="logout-btn">Logout</button>
</a>
</div>

</div>


<h1>Payment Page</h1>

<div class="payment-container">

<h2>{{ food }}</h2>

<h3>
Price : ₹
<span id="price" data-price="{{ price }}">{{ price }}</span>
</h3>

<form method="POST" action="/placeorder">

<input type="hidden" name="food" value="{{ food }}">
<input type="hidden" name="price" value="{{ price }}">
<input type="hidden" name="qty" id="qtyvalue" value="1">

<h3>Quantity</h3>

<button type="button" onclick="decrease()">-</button>

<input type="text" id="qty" class="qty" value="1" readonly>

<button type="button" onclick="increase()">+</button>

<h2>Total : ₹ <span id="total">{{ price }}</span></h2>

<p><b>Choose Payment Method</b></p>

<select name="payment" id="payment" onchange="showQR()" required>

<option value="Cash On Delivery" selected>Cash On Delivery</option>
<option value="Wallet">Wallet</option>
<option value="Google Pay">Google Pay</option>
<option value="PhonePe">PhonePe</option>

</select>

<div class="qrbox" id="qrbox">

<p><b>Scan QR to Pay</b></p>

<img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=VFC-PAYMENT">

</div>

<br>

<button type="submit" class="place-btn">PLACE ORDER</button>

</form>

</div>


<script>

let price = parseInt(document.getElementById("price").dataset.price);
let qty = 1;

function increase(){
qty++;
document.getElementById("qty").value = qty;
document.getElementById("total").innerHTML = qty * price;
document.getElementById("qtyvalue").value = qty;
}

function decrease(){
if(qty > 1){
qty--;
document.getElementById("qty").value = qty;
document.getElementById("total").innerHTML = qty * price;
document.getElementById("qtyvalue").value = qty;
}
}

function showQR(){

let payment = document.getElementById("payment").value;
let qr = document.getElementById("qrbox");

if(payment === "Google Pay" || payment === "PhonePe"){
qr.style.display = "block";
}
else{
qr.style.display = "none";
}

}

</script>

</body>
</html>
