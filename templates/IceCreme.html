<!DOCTYPE html>
<html>
<head>
<title>VFC</title>

<style>

/* PAGE */

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#fafafa;
}

/* NAVBAR */

.navbar{
background:#111;
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 30px;
}

.nav-left a{
color:white;
text-decoration:none;
margin-right:25px;
font-size:17px;
font-weight:bold;
}

.nav-left a:hover{
color:#ff4d4d;
}

.nav-right{
display:flex;
align-items:center;
}

.profile-icon{
width:35px;
height:35px;
border-radius:50%;
margin-right:20px;
cursor:pointer;
}

.logout-btn{
background:#ff4d4d;
color:white;
padding:8px 16px;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

.logout-btn:hover{
background:#e63c3c;
}

/* TITLE */

h1{
text-align:center;
font-size:42px;
margin-top:25px;
color:#ff4d4d;
font-family:Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
}

h2{
text-align:center;
color:#555;
}

/* BUTTON */

.main-btn{
display:block;
margin:20px auto;
background:#ff4d4d;
color:white;
border:none;
padding:12px 25px;
border-radius:8px;
font-size:18px;
cursor:pointer;
}

.main-btn:hover{
background:#e63c3c;
}

/* MENU TITLE */

h3{
text-align:center;
font-size:28px;
margin-top:20px;
margin-bottom:30px;
color:#333;
}

/* GRID */

.grid-container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:30px;
padding:40px 60px;
}

/* FOOD CARD */

.icon-button{
background:white;
border:none;
border-radius:12px;
box-shadow:0 6px 18px rgba(0,0,0,0.1);
display:flex;
flex-direction:column;
align-items:center;
padding:15px;
cursor:pointer;
transition:0.3s;
}

.icon-button:hover{
transform:translateY(-8px);
}

/* FOOD IMAGE */

.icon-button img{
width:100%;
height:180px;
object-fit:cover;
border-radius:10px;
margin-bottom:10px;
}

/* TEXT */

.icon-button span a{
text-decoration:none;
color:#333;
font-size:16px;
font-weight:bold;
}

.icon-button span a:hover{
color:#ff4d4d;
}

</style>

</head>

<body>

<div class="navbar">

<div class="nav-left">
<a href="/home">Home</a>
<a href="/menu">Menu</a>
<a href="/myorders">My Orders</a>

</div>

<div class="nav-right">

<a href="/profile">
<img src="https://cdn-icons-png.flaticon.com/512/847/847969.png" class="profile-icon">
</a>

<a href="/logout">
<button class="logout-btn">Logout</button>
</a>

</div>
</div>

<h1>VFC</h1>

<h2>Good Food, Good Health</h2>

<button class="main-btn">MOST ORDERED</button>

<h3>ICE-CREAM MENU</h3>

<div class="grid-container">

<button class="icon-button">
<img src="static/1000068762.jpg">
<span>
<a href="/chocolate">CHOCOLATE : ₹125</a>
</span>
</button>

<button class="icon-button">
<img src="static/1000068766.jpg">
<span>
<a href="/orangeIce">ORANGE : ₹100</a>
</span>
</button>

<button class="icon-button">
<img src="static/1000068765.jpg">
<span>
<a href="/strawberryIce">STRAWBERRY : ₹120</a>
</span>
</button>

<button class="icon-button">
<img src="static/1000068764.jpg">
<span>
<a href="/pista">PISTA : ₹150</a>
</span>
</button>

<button class="icon-button">
<img src="static/1000068763.jpg">
<span>
<a href="/venella">VANILLA : ₹90</a>
</span>
</button>

</div>

</body>
</html>
