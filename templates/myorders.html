<!DOCTYPE html>
<html>

<head>

<title>My Orders</title>

<style>

/* PAGE */

body{
font-family: Arial, Helvetica, sans-serif;
background:#fafafa;
margin:0;
text-align:center;
}

/* NAVBAR */

.navbar{
background:#111;
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 30px;
}

.nav-left a{
color:white;
text-decoration:none;
margin-right:25px;
font-size:17px;
font-weight:bold;
}

.nav-left a:hover{
color:#ff4d4d;
}

.nav-right{
display:flex;
align-items:center;
}

.profile-icon{
width:35px;
height:35px;
border-radius:50%;
margin-right:20px;
cursor:pointer;
}

.logout-btn{
background:#ff4d4d;
color:white;
padding:8px 16px;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

.logout-btn:hover{
background:#e63c3c;
}

/* TITLE */

h1{
margin-top:30px;
font-size:38px;
color:#ff4d4d;
}

/* ORDER CONTAINER */

.container{
width:60%;
margin:auto;
padding-top:20px;
}

/* ORDER CARD */

.orderbox{
background:white;
padding:20px;
margin:20px;
border-radius:12px;
box-shadow:0 6px 18px rgba(0,0,0,0.1);
text-align:left;
transition:0.3s;
}

.orderbox:hover{
transform:translateY(-5px);
}

/* TEXT */

.orderbox h3{
margin:0;
color:#333;
}

.orderbox p{
font-size:18px;
font-weight:bold;
color:#ff4d4d;
margin-top:8px;
}

</style>

</head>

<body>

<div class="navbar">

<div class="nav-left">

<a href="/home">Home</a>
<a href="/menu">Menu</a>
<a href="/myorders">My Orders</a>

</div>

<div class="nav-right">

<a href="/profile">
<img src="https://cdn-icons-png.flaticon.com/512/847/847969.png" class="profile-icon">
</a>

<a href="/logout">
<button class="logout-btn">Logout</button>
</a>

</div>

</div>

<h1>My Orders</h1>

<div class="container">

{% for order in orders %}

<div class="orderbox">

<h3>Order ID : {{order.order_id}}</h3>

<p>Total Paid : ₹{{order.total}}</p>

</div>

{% endfor %}

</div>

</body>

</html>
