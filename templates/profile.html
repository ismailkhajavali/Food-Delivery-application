<!DOCTYPE html>
<html>

<head>

<title>Profile</title>

<style>

/* PAGE */

body{
font-family:Arial, Helvetica, sans-serif;
background:#fafafa;
margin:0;
text-align:center;
}

/* NAVBAR */

.navbar{
background:#111;
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 30px;
}

.nav-left a{
color:white;
text-decoration:none;
margin-right:25px;
font-size:17px;
font-weight:bold;
}

.nav-left a:hover{
color:#ff4d4d;
}

.nav-right{
display:flex;
align-items:center;
}

.profile-icon{
width:35px;
height:35px;
border-radius:50%;
margin-right:20px;
cursor:pointer;
}

.logout-btn{
background:#ff4d4d;
color:white;
padding:8px 16px;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

.logout-btn:hover{
background:#e63c3c;
}

/* TITLE */

h1{
color:#ff4d4d;
margin-top:30px;
}

/* PROFILE CARD */

.profilebox{
background:white;
width:420px;
margin:40px auto;
padding:35px;
border-radius:12px;
box-shadow:0 6px 18px rgba(0,0,0,0.1);
}

.profilebox h3{
color:#444;
margin:15px 0;
}

/* BUTTONS */

button{
padding:12px 22px;
font-size:16px;
border:none;
border-radius:6px;
background:#ff4d4d;
color:white;
margin:10px;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:#e63c3c;
}

</style>

</head>

<body>

<div class="navbar">

<div class="nav-left">

<a href="/home">Home</a>
<a href="/vegfoodmenu">Menu</a>
<a href="/myorders">My Orders</a>


</div>

<div class="nav-right">

<a href="/profile">
<img src="https://cdn-icons-png.flaticon.com/512/847/847969.png" class="profile-icon">
</a>

<a href="/logout">
<button class="logout-btn">Logout</button>
</a>

</div>

</div>

<h1>User Profile</h1>

<div class="profilebox">

<h3>Name : {{user.name}}</h3>

<h3>Email : {{user.email}}</h3>

<br>

<a href="/myorders">
<button>My Orders</button>
</a>

<a href="/logout">
<button>Logout</button>
</a>

</div>

</body>

</html>
