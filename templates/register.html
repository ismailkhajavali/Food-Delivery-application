<!DOCTYPE html>
<html>
<head>
<title>Register</title>

<style>

/* PAGE */

body{
background:#fafafa;
font-family:Arial, Helvetica, sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

/* REGISTER CARD */

.box{
background:white;
padding:35px;
width:380px;
border-radius:12px;
box-shadow:0 6px 18px rgba(0,0,0,0.15);
}

/* TITLE */

h2{
text-align:center;
color:#ff4d4d;
margin-bottom:20px;
}

/* INPUT */

input{
width:100%;
padding:12px;
margin-top:12px;
border-radius:6px;
border:1px solid #ccc;
font-size:15px;
}

/* BUTTON */

button{
width:100%;
padding:12px;
margin-top:18px;
background:#ff4d4d;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:#e63c3c;
}

/* MESSAGE */

.msg{
text-align:center;
color:green;
margin-bottom:10px;
}

/* LINK */

a{
text-decoration:none;
color:#ff4d4d;
font-weight:bold;
}

a:hover{
text-decoration:underline;
}

</style>
</head>

<body>

<div class="box">

<h2>Create VFC Account</h2>

{% with messages = get_flashed_messages() %}
{% if messages %}
<div class="msg">
{% for message in messages %}
<p>{{ message }}</p>
{% endfor %}
</div>
{% endif %}
{% endwith %}

<form method="POST" action="/register">

<input type="text" name="name" placeholder="Full Name" required>

<input type="email" name="email" placeholder="Email Address" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Register</button>

</form>

<p style="text-align:center;margin-top:18px;">
Already have an account? <a href="/login">Login</a>
</p>

</div>

</body>
</html>
