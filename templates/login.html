<!DOCTYPE html>
<html>
<head>
<title>VFC Login</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:url("https://images.unsplash.com/photo-1504674900247-0877df9cc836") no-repeat center/cover;
}

/* GLASS LOGIN CARD */

.box{
width:360px;
padding:35px;
border-radius:15px;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(10px);
box-shadow:0 10px 30px rgba(0,0,0,0.3);
color:white;
text-align:center;
}

/* TITLE */

h2{
margin-bottom:20px;
font-size:28px;
}

/* INPUT */

input{
width:100%;
padding:12px;
margin-top:12px;
border:none;
border-radius:8px;
outline:none;
font-size:14px;
}

/* BUTTON */

button{
width:100%;
padding:12px;
margin-top:18px;
background:#ff4d4d;
color:white;
border:none;
border-radius:8px;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#e63c3c;
}

/* LINK */

a{
color:#ffdede;
text-decoration:none;
font-weight:bold;
}

a:hover{
text-decoration:underline;
}

/* MESSAGE */

.msg{
color:#fff;
margin-bottom:10px;
}

</style>

</head>

<body>

<div class="box">

<h2>VFC Login</h2>

{% with messages = get_flashed_messages() %}
{% if messages %}
<div class="msg">
{% for message in messages %}
<p>{{ message }}</p>
{% endfor %}
</div>
{% endif %}
{% endwith %}

<form method="POST" action="/login">

<input type="email" name="email" placeholder="Enter Email" required>

<input type="password" name="password" placeholder="Enter Password" required>

<button type="submit">Login</button>

</form>

<p style="margin-top:15px;">
New User? <a href="/register">Register Here</a>
</p>

</div>

</body>
</html>
