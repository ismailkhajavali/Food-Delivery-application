<!DOCTYPE html>
<html>
<head>
<title>VFC</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#fafafa;
}

/* NAVBAR */

.navbar{
background:#111;
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 30px;
}

.nav-left a{
color:white;
text-decoration:none;
margin-right:25px;
font-size:17px;
font-weight:bold;
}

.nav-left a:hover{
color:#ff4d4d;
}

.profile-icon{
width:35px;
height:35px;
border-radius:50%;
margin-right:20px;
}

.logout-btn{
background:#ff4d4d;
color:white;
padding:8px 16px;
border:none;
border-radius:6px;
cursor:pointer;
}

.logout-btn:hover{
background:#e63c3c;
}

/* TITLE */

h1{
text-align:center;
font-size:42px;
margin-top:20px;
color:#ff4d4d;
font-family:Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
}

h2{
text-align:center;
color:#444;
margin-bottom:25px;
}

/* SLIDER */

.slider{
width:90%;
height:350px;
margin:20px auto;
overflow:hidden;
border-radius:12px;
position:relative;
}

.slides{
display:flex;
width:300%;
animation:slide 12s infinite;
}

.slides img{
width:100%;
height:350px;
object-fit:cover;
}

@keyframes slide{
0%{margin-left:0;}
33%{margin-left:-100%;}
66%{margin-left:-200%;}
100%{margin-left:0;}
}

/* BUTTON */

.main-btn{
display:block;
margin:20px auto;
background:#ff4d4d;
color:white;
border:none;
padding:12px 25px;
border-radius:8px;
font-size:18px;
cursor:pointer;
}

.main-btn:hover{
background:#e63c3c;
}

/* CATEGORY TITLE */

h3{
text-align:center;
font-size:28px;
margin-top:30px;
margin-bottom:30px;
}

/* GRID */

.grid-container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:30px;
padding:0 60px 60px 60px;
}

/* FOOD CARD */

.icon-button{
background:white;
border:none;
border-radius:12px;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
display:flex;
flex-direction:column;
align-items:center;
padding:15px;
cursor:pointer;
transition:0.3s;
}

.icon-button:hover{
transform:translateY(-8px);
}

.icon-button img{
width:100%;
height:180px;
object-fit:cover;
border-radius:10px;
margin-bottom:10px;
}

.icon-button span a{
text-decoration:none;
color:#333;
font-size:16px;
font-weight:bold;
}

.icon-button span a:hover{
color:#ff4d4d;
}

</style>
</head>

<body>

<!-- NAVBAR -->

<div class="navbar">

<div class="nav-left">
<a href="/home">Home</a>
<a href="/menu">Menu</a>
<a href="/myorders">My Orders</a>

</div>

<div class="nav-right">
<a href="/profile">
<img src="https://cdn-icons-png.flaticon.com/512/847/847969.png" class="profile-icon">
</a>

<a href="/logout">
<button class="logout-btn">Logout</button>
</a>
</div>

</div>

<h1>VFC</h1>
<h2>Good Food, Good Health</h2>

<!-- SLIDER -->

<div class="slider">

<div class="slides">

<img src="static\slide1.jpg">

<img src="static\slide5.jpeg">

<img src="static\slide4.jpg">

</div>

</div>

<button class="main-btn">MOST ORDERED</button>

<h3>MENU CATEGORIES</h3>

<div class="grid-container">

<button class="icon-button">
<img src="static/nonveg.jpeg">
<span><a href="/nonvegmenu">NON-VEG FOOD</a></span>
</button>

<button class="icon-button">
<img src="static/veg.jpeg">
<span><a href="/vegfoodmenu">VEG FOOD</a></span>
</button>

<button class="icon-button">
<img src="static/non veg start.jpeg">
<span><a href="/nonvegstarter">NON-VEG STARTERS</a></span>
</button>

<button class="icon-button">
<img src="static/veg start.jpeg">
<span><a href="/vegstarter">VEG STARTERS</a></span>
</button>

<button class="icon-button">
<img src="static/desserts.jpeg">
<span><a href="/desserts">DESSERTS</a></span>
</button>

<button class="icon-button">
<img src="static/mocktails.jpeg">
<span><a href="/mocktails">MOCKTAILS</a></span>
</button>

<button class="icon-button">
<img src="static/ice cream.jpeg">
<span><a href="/icecream">ICE CREAM</a></span>
</button>

</div>

</body>
</html>
